<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pre survey Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent-dim: #9ab82a;
      --text: #f0f0f0;
      --muted: #666;
      --error: #ff4d4d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 480px;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2rem;
      position: relative;
    }

    /* accent corner */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 40px; height: 40px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }

    .field {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    input.error, select.error {
      border-color: var(--error);
    }

    .error-msg {
      color: var(--error);
      font-size: 0.7rem;
      margin-top: 0.3rem;
      display: none;
    }

    .error-msg.show { display: block; }

    /* gender row */
    .gender-group {
      display: flex;
      gap: 0.75rem;
    }

    .gender-option {
      flex: 1;
      position: relative;
    }

    .gender-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }

    .gender-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: all 0.2s;
      margin: 0;
    }

    .gender-option input[type="radio"]:checked + label {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 241, 53, 0.05);
    }

    .gender-option label:hover {
      border-color: #444;
      color: var(--text);
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      border-radius: 2px;
      transition: background 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover { background: var(--accent-dim); }
    .submit-btn:active { transform: scale(0.98); }

    .submit-btn.loading {
      pointer-events: none;
      color: transparent;
    }

    .submit-btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #0a0a0a;
    }

    /* spinner */
    .spinner {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px;
      border: 2px solid #0a0a0a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .submit-btn.loading .spinner { display: block; }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      font-size: 0.8rem;
      border-radius: 2px;
      transition: transform 0.3s ease;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--accent); color: var(--accent); }
    .toast.fail { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>

<div class="container">
  <p class="tag">// SURVEY</p>
  <h1>Enter <span>Details</span></h1>
  <p class="subtitle">Fill in your info to start the questions.</p>

  <div class="card">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="full_name" placeholder="e.g. Kavya Bansal" />
      <p class="error-msg" id="err_name">Name is required.</p>
    </div>

    <div class="field">
      <label>Age</label>
      <input type="number" id="age" placeholder="e.g. 19" min="1" max="120" />
      <p class="error-msg" id="err_age">Enter a valid age.</p>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="e.g. you@example.com" />
      <p class="error-msg" id="err_email">Enter a valid email.</p>
    </div>

    <div class="field">
      <label>Gender</label>
      <div class="gender-group">
        <div class="gender-option">
          <input type="radio" name="gender" id="g_m" value="M" />
          <label for="g_m">Male</label>
        </div>
        <div class="gender-option">
          <input type="radio" name="gender" id="g_f" value="F" />
          <label for="g_f">Female</label>
        </div>
        <div class="gender-option">
          <input type="radio" name="gender" id="g_o" value="O" />
          <label for="g_o">Other</label>
        </div>
      </div>
      <p class="error-msg" id="err_gender">Please select a gender.</p>
    </div>

    <button class="submit-btn" onclick="submitForm()">
      Start Quiz →
      <div class="spinner"></div>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function validate() {
    let valid = true;

    const name = document.getElementById('full_name');
    const age = document.getElementById('age');
    const email = document.getElementById('email');
    const gender = document.querySelector('input[name="gender"]:checked');

    // reset
    ['full_name','age','email'].forEach(id => {
      document.getElementById(id).classList.remove('error');
    });
    document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));

    if (!name.value.trim()) {
      name.classList.add('error');
      document.getElementById('err_name').classList.add('show');
      valid = false;
    }

    if (!age.value || age.value < 10 || age.value > 120) {
      age.classList.add('error');
      document.getElementById('err_age').classList.add('show');
      valid = false;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email.value)) {
      email.classList.add('error');
      document.getElementById('err_email').classList.add('show');
      valid = false;
    }

    if (!gender) {
      document.getElementById('err_gender').classList.add('show');
      valid = false;
    }

    return valid;
  }

  async function submitForm() {
    if (!validate()) return;

    const btn = document.querySelector('.submit-btn');
    btn.classList.add('loading');

    const payload = {
      full_name: document.getElementById('full_name').value.trim(),
      age: parseInt(document.getElementById('age').value),
      email: document.getElementById('email').value.trim(),
      gender: document.querySelector('input[name="gender"]:checked').value,
    };

    try {
      const res = await fetch('http://127.0.0.1:8000/form', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();

     if (data.message === "User already exists") {
    showToast('⚠ User already exists.', 'fail');
} else {
    sessionStorage.getItem("email",payload.email)
    showToast('✓ Registered! Starting questions')
    setTimeout(() => {
        window.location.href = '/quiz-page'
    }, 1000)
}
    } catch (err) {
      showToast('✗ Could not connect to server.', 'fail');
    } finally {
      btn.classList.remove('loading');
    }
  }
    const data = await res.json();

if (data.message === "user already exists") {
    alert("This email has already been registered!");
    return;
}

if (res.ok) {
    sessionStorage.setItem("email", email);
    window.location.href = "/quiz-page";
}
</script>
</body>
</html>
